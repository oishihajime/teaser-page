<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity | 8月1日オープン予定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", -apple-system, sans-serif;
    background: #fff;
    color: #333;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
    padding-left: 28px;
    padding-right: 28px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
  }
  .container {
    max-width: 334px;
    width: 100%;
    text-align: left;
    display: flex;
    flex-direction: column;
  }
  .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .logo {
    font-family: "DIN Alternate", "DIN Condensed", "Barlow", sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #27AB7E, #27AAAB, #2781AB, #22AB4F);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200%;
    animation: rainbow-shift 4s ease-in-out infinite alternate;
  }
  @keyframes rainbow-shift {
    0% { background-position: 0%; }
    100% { background-position: 100%; }
  }
  .spotify-link {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .spotify-link:hover { opacity: 0.7; }
  .sp-icon { width: 20px; height: 20px; }
  .announce {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.7;
    color: #333;
    margin-bottom: 1rem;
  }
  .latin {
    font-family: "DIN Alternate", "DIN Condensed", "Barlow", sans-serif;
  }
  .subtext {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.7;
    color: #666;
    margin-bottom: 1.25rem;
  }
  .date-badge {
    font-family: "DIN Alternate", "DIN Condensed", "Barlow", sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #27AB7E;
    border: 1px solid rgba(39, 171, 126, 0.4);
    border-radius: 999px;
    padding: 5px 16px;
    display: inline-block;
    width: fit-content;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="title-row">
      <h1 class="logo">Move On Up</h1>
      <a class="spotify-link" href="https://open.spotify.com/playlist/4eAKwJ1Z3pjR88TKLj4HZ3?si=d57e629ca4ae4c11" target="_blank">

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = '1';
    });
  </script>
</body>
</html>
